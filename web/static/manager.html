<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gift Watch Manager</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 20px; background: #0f172a; color: #e2e8f0; }
    h1 { margin: 0 0 12px; }
    .muted { color: #94a3b8; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0 16px; }
    button {
      border: 1px solid #334155; background: #1e293b; color: #e2e8f0;
      padding: 6px 10px; border-radius: 8px; cursor: pointer;
    }
    button:hover { background: #334155; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border-bottom: 1px solid #334155; padding: 8px; text-align: left; font-size: 14px; }
    th { color: #93c5fd; font-weight: 600; }
    .ok { color: #22c55e; font-weight: 600; }
    .bad { color: #f43f5e; font-weight: 600; }
    .warn { color: #fbbf24; font-weight: 600; }
    a { color: #60a5fa; text-decoration: none; }
    .port-input { width: 92px; padding: 4px 6px; border-radius: 6px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; }
    .identity-cell { min-width: 180px; }
    .log-box {
      margin-top: 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #020617;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      height: 320px;
      overflow: auto;
      white-space: pre-wrap;
    }
    select { padding: 6px 8px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; }
  </style>
</head>
<body>
  <h1>实例管理</h1>
  <div class="muted">自动扫描 <code>.env-*</code>，支持前后端一键启停，5 秒自动刷新</div>

  <div class="row">
    <button id="btnRefresh">立即刷新</button>
    <button id="btnStartAll">全部启动</button>
    <button id="btnStopAll">全部停止</button>
    <button id="btnLogout">退出管理员</button>
    <button id="btnAutoRefresh">自动刷新: 开</button>
    <span id="status" class="muted"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Env</th>
        <th>发送号</th>
        <th>前端端口</th>
        <th>前端状态</th>
        <th>后端状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <h2 style="margin-top:18px;">日志查看</h2>
  <div class="row">
    <label>实例
      <select id="logEnv"></select>
    </label>
    <label>类型
      <select id="logRole">
        <option value="collector">collector</option>
        <option value="web">web</option>
      </select>
    </label>
    <button id="btnLoadLog">刷新日志</button>
    <span id="logMeta" class="muted"></span>
  </div>
  <div id="logBox" class="log-box"></div>

  <script>
    const detectBasePath = () => {
      const path = window.location.pathname.replace(/\/$/, "");
      if (path.endsWith("/manager")) {
        return path.slice(0, -"/manager".length) || "";
      }
      return "";
    };
    const BASE_PATH = detectBasePath();
    const withBase = (path) => `${BASE_PATH}${path}`;
    const PAGE_QUERY = new URLSearchParams(window.location.search || "");
    const ACTIVE_TICKET = (PAGE_QUERY.get("ticket") || "").trim();

    const withTicket = (path) => {
      const normalized = path || "/";
      const [pathname, rawQuery = ""] = normalized.split("?", 2);
      const searchParams = new URLSearchParams(rawQuery);
      if (ACTIVE_TICKET && !searchParams.has("ticket")) {
        searchParams.set("ticket", ACTIVE_TICKET);
      }
      const qs = searchParams.toString();
      return withBase(qs ? `${pathname}?${qs}` : pathname);
    };

    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");
    const autoBtn = document.getElementById("btnAutoRefresh");
    const pendingPorts = new Map();
    const identityCache = new Map();
    let autoRefreshEnabled = true;
    let isEditingPort = false;
    let knownInstances = [];

    const callApi = async (path, method = "GET", body = null) => {
      const resp = await fetch(withTicket(path), {
        method,
        headers: body ? { "Content-Type": "application/json" } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!resp.ok) {
        let detail = `HTTP ${resp.status}`;
        try {
          const payload = await resp.json();
          detail = payload?.detail || detail;
        } catch {}
        throw new Error(detail);
      }
      return await resp.json();
    };

    const escapeHtml = (value) =>
      String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

    const actionBtn = (label, onClick) => {
      const btn = document.createElement("button");
      btn.textContent = label;
      btn.addEventListener("click", onClick);
      return btn;
    };

    const getIdentityClass = (status) => {
      if (status === "ok") return "ok";
      if (status === "login_required") return "warn";
      if (status === "loading") return "muted";
      return "bad";
    };

    const renderIdentityCell = (envFile, payload) => {
      const safeEnv = envFile.replace(/[^a-zA-Z0-9_-]/g, "_");
      const cell = document.getElementById(`identity-${safeEnv}`);
      if (!cell) return;
      const status = payload?.status || "missing_credentials";
      const message = escapeHtml(payload?.message || "未配置发送号登录态");
      cell.className = `identity-cell ${getIdentityClass(status)}`;
      cell.textContent = message;
    };

    const fetchIdentity = async (envFile, { force = false } = {}) => {
      const cached = identityCache.get(envFile);
      const now = Date.now();
      if (!force && cached && cached.data && now - cached.fetchedAt < 5 * 60 * 1000) {
        renderIdentityCell(envFile, cached.data);
        return cached.data;
      }
      if (cached?.pending) {
        return cached.pending;
      }
      renderIdentityCell(envFile, { status: "loading", message: "检测中..." });
      const pending = callApi(`/api/manager/bot_identity?env_file=${encodeURIComponent(envFile)}`)
        .then((data) => {
          identityCache.set(envFile, { data, fetchedAt: Date.now() });
          renderIdentityCell(envFile, data);
          return data;
        })
        .catch((err) => {
          const data = { status: "request_failed", message: `检测失败：${err.message || err}` };
          identityCache.set(envFile, { data, fetchedAt: Date.now() });
          renderIdentityCell(envFile, data);
          return data;
        })
        .finally(() => {
          const latest = identityCache.get(envFile);
          if (latest?.pending) {
            delete latest.pending;
          }
        });
      identityCache.set(envFile, { ...(cached || {}), pending });
      return pending;
    };

    const refreshIdentityCells = async (items, { force = false } = {}) => {
      for (const it of items || []) {
        await fetchIdentity(it.env_file, { force });
      }
    };

    const syncLogEnvSelect = (items) => {
      const sel = document.getElementById("logEnv");
      const previous = sel.value;
      sel.innerHTML = "";
      items.forEach((it) => {
        const opt = document.createElement("option");
        opt.value = it.env_file;
        opt.textContent = it.env_file;
        sel.appendChild(opt);
      });
      if (!items.length) return;
      sel.value = items.some((x) => x.env_file === previous) ? previous : items[0].env_file;
    };

    const render = (items) => {
      knownInstances = items || [];
      syncLogEnvSelect(knownInstances);
      rowsEl.innerHTML = "";
      if (!items.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 6;
        td.className = "muted";
        td.textContent = "未发现 .env-* 文件";
        tr.appendChild(td);
        rowsEl.appendChild(tr);
        return;
      }

      items.forEach((it) => {
        const tr = document.createElement("tr");
        const inputId = `port-${it.env_file.replace(/[^a-zA-Z0-9_-]/g, "_")}`;
        const pendingPort = pendingPorts.get(it.env_file);
        const shownPort = Number.isFinite(pendingPort) ? pendingPort : it.web_port;
        const openUrl = `${window.location.origin}${withTicket(`/app?env=${encodeURIComponent(it.env_file)}`)}`;
        const safeEnv = it.env_file.replace(/[^a-zA-Z0-9_-]/g, "_");
        const envText = escapeHtml(it.env_file);
        tr.innerHTML = `
          <td><code>${envText}</code></td>
          <td id="identity-${safeEnv}" class="identity-cell muted">检测中...</td>
          <td>
            <div class="row" style="margin:0;">
              <input id="${inputId}" class="port-input" type="number" min="1" max="65535" value="${shownPort}" />
              <a href="${openUrl}" target="_blank" rel="noopener">打开</a>
            </div>
          </td>
          <td class="${it.web_running ? "ok" : "bad"}">${it.web_running ? "运行中" : "未运行"}${it.web_pid ? ` (PID ${it.web_pid})` : ""}</td>
          <td class="${it.collector_running ? "ok" : "bad"}">${it.collector_running ? "运行中" : "未运行"}${it.collector_pid ? ` (PID ${it.collector_pid})` : ""}</td>
          <td></td>
        `;

        const ops = tr.lastElementChild;
        const portInput = tr.querySelector(`#${inputId}`);
        portInput?.addEventListener("focus", () => { isEditingPort = true; });
        portInput?.addEventListener("blur", () => { isEditingPort = false; });
        portInput?.addEventListener("input", () => {
          const v = Number(portInput.value || 0);
          if (v >= 1 && v <= 65535) {
            pendingPorts.set(it.env_file, v);
          }
        });

        ops.appendChild(actionBtn("启动全部", async () => {
          await callApi("/api/manager/start", "POST", { env_file: it.env_file, target: "all" });
          await refresh();
        }));
        ops.appendChild(actionBtn("停全部", async () => {
          await callApi("/api/manager/stop", "POST", { env_file: it.env_file, target: "all" });
          await refresh();
        }));
        ops.appendChild(actionBtn("启动前端", async () => {
          await callApi("/api/manager/start", "POST", { env_file: it.env_file, target: "web" });
          await refresh();
        }));
        ops.appendChild(actionBtn("启动后端", async () => {
          await callApi("/api/manager/start", "POST", { env_file: it.env_file, target: "collector" });
          await refresh();
        }));
        ops.appendChild(actionBtn("保存端口", async () => {
          const input = document.getElementById(inputId);
          const port = Number(input?.value || 0);
          if (!port || port < 1 || port > 65535) {
            alert("请输入有效端口(1-65535)");
            return;
          }
          await callApi("/api/manager/set_port", "POST", { env_file: it.env_file, web_port: port });
          pendingPorts.delete(it.env_file);
          await refresh();
        }));
        rowsEl.appendChild(tr);
      });
    };

    const refresh = async () => {
      if (isEditingPort) return;
      try {
        statusEl.textContent = "刷新中...";
        const data = await callApi("/api/manager/instances");
        render(data);
        refreshIdentityCells(data);
        statusEl.textContent = `最近刷新: ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        statusEl.textContent = `刷新失败: ${err.message || err}`;
      }
    };

    const loadLog = async () => {
      const envFile = document.getElementById("logEnv").value;
      const role = document.getElementById("logRole").value;
      const box = document.getElementById("logBox");
      const meta = document.getElementById("logMeta");
      if (!envFile) {
        box.textContent = "暂无实例";
        return;
      }
      try {
        const data = await callApi(`/api/manager/logs?env_file=${encodeURIComponent(envFile)}&role=${encodeURIComponent(role)}&tail=300`);
        box.textContent = data.content || "(日志为空)";
        meta.textContent = `${data.role} ${data.running ? "运行中" : "未运行"}${data.pid ? ` PID=${data.pid}` : ""} · ${data.log_path}`;
        box.scrollTop = box.scrollHeight;
      } catch (err) {
        box.textContent = `日志加载失败: ${err.message || err}`;
      }
    };

    document.getElementById("btnRefresh").addEventListener("click", refresh);
    document.getElementById("btnLogout").addEventListener("click", async () => {
      window.location.href = withBase("/access");
    });
    document.getElementById("btnStartAll").addEventListener("click", async () => {
      try {
        const data = await callApi("/api/manager/start_all", "POST");
        if (data.errors?.length) {
          alert("部分实例启动失败:\n" + data.errors.map((e) => `${e.env_file}: ${e.error}`).join("\n"));
        }
      } finally {
        refresh();
      }
    });
    document.getElementById("btnStopAll").addEventListener("click", async () => {
      await callApi("/api/manager/stop_all", "POST");
      refresh();
    });
    autoBtn.addEventListener("click", () => {
      autoRefreshEnabled = !autoRefreshEnabled;
      autoBtn.textContent = `自动刷新: ${autoRefreshEnabled ? "开" : "关"}`;
    });
    document.getElementById("btnLoadLog").addEventListener("click", loadLog);
    document.getElementById("logEnv").addEventListener("change", loadLog);
    document.getElementById("logRole").addEventListener("change", loadLog);
    refresh();
    setTimeout(loadLog, 200);
    setInterval(() => {
      if (!autoRefreshEnabled) return;
      refresh();
      loadLog();
    }, 5000);
  </script>
</body>
</html>
