<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gift Watch Access</title>
  <style>
    :root {
      --bg: #060816;
      --panel: rgba(11, 18, 32, 0.78);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e5eefb;
      --muted: #94a3b8;
      --accent: #67e8f9;
      --accent-2: #22d3ee;
      --danger: #fb7185;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 18%, rgba(34, 211, 238, 0.14), transparent 24%),
        radial-gradient(circle at 82% 24%, rgba(103, 232, 249, 0.1), transparent 20%),
        linear-gradient(180deg, #09101f 0%, #040712 100%);
    }

    .shell {
      width: min(460px, 100%);
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      letter-spacing: 0.24em;
      font-size: 12px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    input, button {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      font-size: 15px;
    }

    input {
      padding: 0 14px;
      border: 1px solid var(--line);
      background: rgba(2, 6, 18, 0.66);
      color: var(--text);
    }

    button {
      border: 0;
      cursor: pointer;
      color: #041017;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      font-size: 14px;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--accent); }
  </style>
</head>
<body>
  <div class="shell">
    <p class="eyebrow">Gift Watch Portal</p>
    <h1>输入访问密码</h1>
    <p>主播输入自己的专属密码即可进入对应面板；管理员密码会直接进入管理页。</p>

    <form id="loginForm">
      <input id="passwordInput" type="password" placeholder="请输入访问密码" autocomplete="current-password" />
      <button id="submitBtn" type="submit">进入</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const input = document.getElementById("passwordInput");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    const setStatus = (message, kind = "") => {
      statusEl.textContent = message || "";
      statusEl.className = `status ${kind}`.trim();
    };

    const redirectIfLoggedIn = async () => {
      try {
        const resp = await fetch("/api/access/session", { credentials: "same-origin" });
        if (!resp.ok) return;
        const data = await resp.json();
        if (data?.authenticated && data?.destination) {
          window.location.href = data.destination;
        }
      } catch {}
    };

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = input.value.trim();
      if (!password) {
        setStatus("请输入访问密码", "error");
        return;
      }

      submitBtn.disabled = true;
      setStatus("正在验证...", "success");

      try {
        const resp = await fetch("/api/access/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
          credentials: "same-origin",
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || !data?.ok) {
          throw new Error(data?.detail || `HTTP ${resp.status}`);
        }
        setStatus("验证成功，正在跳转...", "success");
        window.location.href = data.destination || "/app";
      } catch (err) {
        setStatus(err.message || String(err), "error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    redirectIfLoggedIn();
  </script>
</body>
</html>
